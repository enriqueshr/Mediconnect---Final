<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment Failed — MediConnect</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lora:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/style.css"/>
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.box{background:var(--surface);border-radius:20px;padding:3rem 2rem;text-align:center;max-width:480px;width:90%;box-shadow:var(--shadow-md);border:1px solid var(--border)}
.icon{font-size:4rem;margin-bottom:1.25rem;display:block}
h1{font-family:'Lora',serif;font-size:1.6rem;color:var(--danger);margin-bottom:.5rem}
p{color:var(--text2);font-size:.9rem;line-height:1.6;margin-bottom:1rem}
</style>
</head>
<body>
<div class="box">
  <span class="icon">❌</span>
  <h1>Payment Failed</h1>
  <p>Your payment could not be processed. No amount has been deducted. Your appointment is still saved — you can retry payment from My Appointments.</p>
  <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem">
    <a href="/" class="btn btn-primary">🔄 Try Again</a>
    <a href="/" class="btn btn-outline">🏠 Go Home</a>
  </div>
</div>
</body>
</html>
